<link rel="stylesheet" href="https://unpkg.com/aplayer/dist/APlayer.min.css">
<script src="https://unpkg.com/aplayer/dist/APlayer.min.js"></script>

<!-- 播放器容器 -->
<div id="aplayer" style="height: 300px;"></div>
<div class="aplayer-toggle-list">播放列表</div>

<script>
const ap = new APlayer({
    container: document.getElementById('aplayer'),
    fixed: false,
    listFolded: false,
    listMaxHeight: '200px',   // 列表更合理
    audio: {{ .Site.Params.playlist | jsonify | safeJS }},
    theme: '#1db954'
});
const toggleBtn = document.querySelector('.aplayer-toggle-list');
const list = document.querySelector('.aplayer-list');

toggleBtn.addEventListener('click', () => {
    list.classList.toggle('show');
});

document.addEventListener('click', (e) => {
    if (!list.contains(e.target) && !toggleBtn.contains(e.target)) {
        list.classList.remove('show');
    }
});
</script>

<style>
/* ===== 通用 ===== */
#aplayer {
  width: 100%;
}

.aplayer {
  width: 100% !important;
  height: auto !important;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

/* 封面（PC 默认） */
.aplayer-pic {
  width: 120px !important;
  height: 120px !important;
  background-size: cover !important;
  background-position: center;
}

/* 信息区 */
.aplayer-info {
  padding: 10px;
}

/* 列表 */
.aplayer-list {
  max-height: 300px !important;
  overflow-y: auto;
}

/* ===== 🎯 移动端重排 ===== */
@media (max-width: 600px) {

  /* 整体改为竖排 */
  .aplayer-body {
    flex-direction: column !important;
  }

  /* 封面变大图 */
  .aplayer-pic {
    width: 100% !important;
    height: 220px !important;   /* 可调：180~260 */
    max-width: none;
    border-radius: 8px;
  }

  /* 信息区居中 */
  .aplayer-info {
    text-align: center;
    padding: 12px 8px;
  }

  /* 标题 */
  .aplayer-title {
    font-size: 1rem !important;
  }

  .aplayer-author {
    font-size: 0.85rem !important;
    opacity: 0.7;
  }

  /* 控制条居中 */
  .aplayer-controller {
    justify-content: center !important;
  }

  /* 进度条优化 */
  .aplayer-bar-wrap {
    margin: 0 10px;
  }

  /* 列表高度缩小 */
  .aplayer-list {
    max-height: 200px !important;
  }
}

/* ===== 移动端抽屉列表 ===== */
@media (max-width: 600px) {

  /* 列表变成抽屉 */
  .aplayer-list {
    position: fixed;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 50vh;

    background: var(--theme, #fff);
    z-index: 999;

    transform: translateY(100%);
    transition: transform 0.3s ease;

    overflow-y: auto;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
  }

  /* 打开状态 */
  .aplayer-list.show {
    transform: translateY(0);
  }

  /* 按钮样式 */
  .aplayer-toggle-list {
    margin-top: 10px;
    text-align: center;
    cursor: pointer;
    font-size: 0.9rem;
    opacity: 0.7;
  }
}

</style>
