<link rel="stylesheet" href="https://unpkg.com/aplayer/dist/APlayer.min.css">
<script src="https://unpkg.com/aplayer/dist/APlayer.min.js"></script>

<!-- 播放器容器 -->
<div id="aplayer" style="height: 300px;"></div>

<script>
const ap = new APlayer({
    container: document.getElementById('aplayer'),
    istFolded: false,
    listMaxHeight: '40vh',
    audio: {{ .Site.Params.playlist | jsonify | safeJS }},
    theme: '#1db954'      // 主题色
});
</script>

<style>
/* 容器自适应 */
#aplayer {
  width: 100%;
  max-width: 100%;
}

/* 播放器整体 */
.aplayer {
  width: 100% !important;
  height: auto !important;
}

/* 封面自适应 */
.aplayer-pic {
  width: 20vw !important;
  height: 20vw !important;
  max-width: 120px;
  max-height: 120px;
}

/* 播放列表 */
.aplayer-list {
  max-height: 40vh !important;
  overflow-y: auto;
}

/* 文字缩放 */
.aplayer-title,
.aplayer-author {
  font-size: clamp(0.8rem, 2.5vw, 1.1rem) !important;
}

@media (max-width: 600px) {
  .aplayer-body {
    flex-direction: column !important;
  }

  .aplayer-pic {
    width: 100% !important;
    height: auto !important;
    max-width: none;
  }
}
</style>
